apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: audnix-imap-worker-redis-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: audnix-imap-worker
  pollingInterval: 20       # Check Redis every 20s
  cooldownPeriod: 120     # Wait 2 min before scaling down
  minReplicaCount: 5      # Always keep 5 pods = 250 mailboxes minimum
  maxReplicaCount: 20     # Max 20 pods = 1,000 mailboxes
  triggers:
    - type: redis-list
      authenticationRef:
        name: audnix-redis-auth
      metadata:
        listName: imap:orphans
        listLength: "5"    # Scale up when ≥5 orphans are waiting
        activationListLength: "1"  # Don't scale to zero
---
# Alternative: scale based on per-pod mailbox saturation.
# When the AVERAGE connections per pod approaches MAX_SOCKETS (50),
# scale up so new pods can claim the overflow.
# Uncomment this trigger and comment out the redis-list trigger above
# to switch to saturation-based autoscaling.
