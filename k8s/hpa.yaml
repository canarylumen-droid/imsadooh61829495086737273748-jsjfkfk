apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: audnix-redis-auth
spec:
  secretTargetRef:
    - parameter: address
      name: audnix-secrets
      key: redis-address
    - parameter: password
      name: audnix-secrets
      key: redis-password
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: audnix-email-worker-queue-scaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: audnix-worker-email
  pollingInterval: 15
  cooldownPeriod: 180
  minReplicaCount: 2
  maxReplicaCount: 50
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus-operated.monitoring.svc.cluster.local:9090
        metricName: audnix_email_worker_backlog
        threshold: "25"
        query: sum(audnix_bullmq_waiting_jobs{queue=~"emailSync|emailVerification|emailRouting|emailReassign"} + audnix_bullmq_delayed_jobs{queue=~"emailSync|emailVerification|emailRouting|emailReassign"})
---
