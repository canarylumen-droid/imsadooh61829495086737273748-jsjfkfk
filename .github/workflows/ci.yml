name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, TypeCheck & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit (non-blocking)
        run: npm audit --audit-level=critical || echo "::warning::Security audit found issues — review needed"

      - name: Compile Rust workers
        run: |
          cargo build --release --manifest-path ./rust-email-sender/Cargo.toml
          cargo build --release --manifest-path ./rust-imap-worker/Cargo.toml

      - name: Type check
        run: npm run check

      - name: Build client
        run: npm run build:client

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
