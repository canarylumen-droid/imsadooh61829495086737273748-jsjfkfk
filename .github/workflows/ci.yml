name: CI Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/**"
      - ".opencode/**"
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - ".github/**"
      - ".opencode/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Security Audit (non-blocking)
        run: npm audit --audit-level=critical || echo "::warning::Security audit found issues — review needed"

      - name: Type check
        run: npm run check

      - name: Build client
        run: npm run build:client

  rust:
    name: Compile Rust workers
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.86
      - run: cargo build --release --manifest-path ./rust-email-sender/Cargo.toml
      - run: cargo build --release --manifest-path ./rust-imap-worker/Cargo.toml

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test
