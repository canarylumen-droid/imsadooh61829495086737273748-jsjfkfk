# =============================================================================
# Audnix AI — Production Nginx Base Config
# =============================================================================
# Architecture:
#   - This base config always starts successfully (HTTP-only, port 80)
#   - After SSL cert is obtained via certbot-init.sh, conf.d/ssl.conf is
#     auto-generated and nginx is reloaded to enable HTTPS
#   - conf.d/*.conf is included below — empty on first boot = HTTP-only mode
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # Rate Limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr_limit:10m;

    # Upstream: unified app container
    upstream app_backend {
        server app:5000;
        keepalive 32;
    }

    # =================================================================
    # HTTP Server (port 80) — Always active
    # Before SSL: proxies directly to app
    # After SSL: certbot-init.sh adds conf.d/ssl.conf which adds HTTPS +
    #            HTTP → HTTPS redirect for the specific domain only
    # =================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name _;  # Catch-all: handles both IP access and domains

        # Certbot ACME challenge (needed for initial SSL cert issuance)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type "text/plain";
        }

        # Health check (no rate limit, no logging)
        location /health {
            proxy_pass http://app_backend;
            access_log off;
        }

        # WebSocket / Socket.io
        location /socket.io/ {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # All other routes — proxy to Express app
        location / {
            proxy_pass http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 60s;
            limit_req zone=api_limit burst=50 nodelay;
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html { root /usr/share/nginx/html; }
    }

    # =================================================================
    # Dynamic includes: conf.d/ssl.conf is written by certbot-init.sh
    # On first boot conf.d/ is empty, so only HTTP is served above.
    # After certbot-init.sh runs, conf.d/ssl.conf adds:
    #   - HTTP redirect (port 80 for the specific domain)
    #   - HTTPS server (port 443 with real cert)
    # =================================================================
    include /etc/nginx/conf.d/*.conf;
}
