version: '3.8'

services:
  # --- Nginx Load Balancer ---
  nginx:
    image: nginx:alpine
    container_name: audnix-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    restart: always

  # --- Main API Gateway ---
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: audnix-ai:latest
    container_name: audnix-api-gateway
    environment:
      - NODE_ENV=production
      - PORT=5000
      - APP_ROLE=api
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - SESSION_SECRET=${SESSION_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  # --- Email Worker (Sync & Processing) ---
  email-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: audnix-ai:latest
    container_name: audnix-email-worker
    environment:
      - NODE_ENV=production
      - APP_ROLE=email
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  # --- Outreach Worker ---
  outreach-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: audnix-ai:latest
    container_name: audnix-outreach-worker
    environment:
      - NODE_ENV=production
      - APP_ROLE=outreach
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1024M
    restart: always

  # --- RAG Worker ---
  rag-worker:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: audnix-ai:latest
    container_name: audnix-rag-worker
    environment:
      - NODE_ENV=production
      - APP_ROLE=rag
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2048M
    restart: always

  # --- Vector DB Service ---
  vector-db-service:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: audnix-ai:latest
    container_name: audnix-vector-db-service
    environment:
      - NODE_ENV=production
      - APP_ROLE=vectordb
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    restart: always

  # --- Redis for Queues (BullMQ) & Locking ---
  redis:
    image: redis:7-alpine
    container_name: audnix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # --- Local Postgres (Optional, if not using Neon) ---
  # db:
  #   image: postgres:15-alpine
  #   container_name: audnix-db
  #   environment:
  #     - POSTGRES_DB=audnix
  #     - POSTGRES_USER=user
  #     - POSTGRES_PASSWORD=password
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
