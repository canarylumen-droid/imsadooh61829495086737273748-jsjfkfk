services:
  kumomta:
    image: ghcr.io/kumocorp/kumomta:latest
    restart: always
    ports:
      - "2525:2525"
    volumes:
      - ./kumomta:/opt/kumomta/policy
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
